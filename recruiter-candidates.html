<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobLynk – Candidates</title>
    <meta name="description" content="Review and manage candidates on JobLynk.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css?v=20260419">
    <link rel="stylesheet" href="recruiter-dashboard.css?v=20260419">
    <script src="auth-guard.js?v=20260419" data-role="recruiter"></script>
</head>

<body>
    <div id="app-sidebar" data-role="recruiter" data-active="candidates"></div>
    <div id="app-topbar" data-label="Recruiter"></div>

    <main class="main-content">
        <nav id="app-breadcrumb" data-crumbs='[{"label":"Recruiter","href":"recruiter-overview.html"},{"label":"Candidates"}]'></nav>

        <section class="dash-section">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-users section-icon" style="color:#059669"></i> Candidates</h2>
                <div style="display: flex; gap: 10px;">
                    <select id="candidateJobFilter" class="filter-select" style="width: auto; min-width: 160px;">
                        <option value="">Filter by Job: All</option>
                    </select>
                </div>
            </div>
            <div class="candidate-list" id="candidatesList">
                <div class="candidate-item">
                    <div class="candidate-info-wrapper">
                        <div class="candidate-details">
                            <h4>No candidates yet</h4>
                            <p>Applications to your jobs will appear here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Candidate Review Modal -->
    <div id="candidateModal" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:var(--bg-white); border-radius:16px; max-width:720px; width:94%; max-height:90vh; overflow-y:auto; padding:28px; box-shadow:0 24px 48px rgba(0,0,0,0.2); position:relative;">
            <button onclick="closeCandidateModal()" style="position:absolute; top:14px; right:14px; background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--text-muted);"><i class="fa-solid fa-xmark"></i></button>
            <h3 style="margin-bottom:18px; font-size:1.15rem;"><i class="fa-solid fa-user" style="color:#059669; margin-right:8px;"></i>Candidate Review</h3>
            <div id="candidateModalBody"></div>
            <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;" id="candidateModalActions"></div>
        </div>
    </div>

    <script src="components.js?v=20260419"></script>
    <script src="jobs-store.js?v=20260419"></script>
    <script src="recruiter-dashboard.js?v=20260419"></script>
</body>

</html>
