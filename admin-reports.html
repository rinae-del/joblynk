<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joblynk â€“ Reports & Analytics</title>
    <meta name="description" content="Platform reports and analytics for Joblynk administrators.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css?v=10">
    <link rel="stylesheet" href="admin-dashboard.css?v=12">
    <script src="auth-guard.js?v=8" data-role="admin"></script>
</head>

<body>
    <div id="app-sidebar" data-role="admin" data-active="reports"></div>
    <div id="app-topbar" data-label="Admin" data-role="admin"></div>

    <main class="main-content">
        <nav id="app-breadcrumb" data-crumbs='[{"label":"Admin","href":"admin-overview.html"},{"label":"Reports"}]'></nav>

        <section class="dash-section">
            <!-- ── Toolbar ── -->
            <div class="users-toolbar">
                <div class="reports-toolbar-row">
                    <select class="filter-select" id="reportPeriodFilter">
                        <option value="30">Last 30 days</option>
                        <option value="7">Last 7 days</option>
                        <option value="90">Last 90 days</option>
                        <option value="all">All time</option>
                    </select>
                    <button class="export-btn" onclick="exportReportsCSV()">
                        <i class="fa-solid fa-download"></i> Export CSV
                    </button>
                </div>
            </div>

            <div class="report-cards" id="reportCards">
                <div class="report-card">
                    <div class="report-card-header">
                        <div class="report-card-icon" style="background:rgba(59,130,246,0.1); color:#3B82F6;"><i class="fa-solid fa-users"></i></div>
                        <div class="report-card-data">
                            <span class="report-card-value" id="reportTotalUsers">—</span>
                            <span class="report-card-label">Total Users</span>
                        </div>
                    </div>
                    <div class="report-card-detail">
                        <div class="report-bar-row"><span>Verified</span><div class="report-bar"><div class="report-bar-fill" id="barVerified" style="width:0%; background:#059669;"></div></div><span id="pctVerified">0%</span></div>
                        <div class="report-bar-row"><span>Unverified</span><div class="report-bar"><div class="report-bar-fill" id="barUnverified" style="width:0%; background:#F59E0B;"></div></div><span id="pctUnverified">0%</span></div>
                    </div>
                </div>
                <div class="report-card">
                    <div class="report-card-header">
                        <div class="report-card-icon" style="background:rgba(126,34,206,0.1); color:#7E22CE;"><i class="fa-solid fa-briefcase"></i></div>
                        <div class="report-card-data">
                            <span class="report-card-value" id="reportTotalJobs">—</span>
                            <span class="report-card-label">Total Jobs</span>
                        </div>
                    </div>
                    <div class="report-card-detail">
                        <div class="report-bar-row"><span>Active</span><div class="report-bar"><div class="report-bar-fill" id="barJobsActive" style="width:0%; background:#059669;"></div></div><span id="pctJobsActive">0%</span></div>
                        <div class="report-bar-row"><span>Closed</span><div class="report-bar"><div class="report-bar-fill" id="barJobsClosed" style="width:0%; background:#6B7280;"></div></div><span id="pctJobsClosed">0%</span></div>
                        <div class="report-bar-row"><span>Draft</span><div class="report-bar"><div class="report-bar-fill" id="barJobsDraft" style="width:0%; background:#DC2626;"></div></div><span id="pctJobsDraft">0%</span></div>
                    </div>
                </div>
                <div class="report-card">
                    <div class="report-card-header">
                        <div class="report-card-icon" style="background:rgba(5,150,105,0.1); color:#059669;"><i class="fa-solid fa-file-signature"></i></div>
                        <div class="report-card-data">
                            <span class="report-card-value" id="reportTotalApps">—</span>
                            <span class="report-card-label">Applications</span>
                        </div>
                    </div>
                    <div class="report-card-detail">
                        <div class="report-bar-row"><span>Reviewed</span><div class="report-bar"><div class="report-bar-fill" id="barAppsReviewed" style="width:0%; background:#3B82F6;"></div></div><span id="pctAppsReviewed">0%</span></div>
                        <div class="report-bar-row"><span>Pending</span><div class="report-bar"><div class="report-bar-fill" id="barAppsPending" style="width:0%; background:#F59E0B;"></div></div><span id="pctAppsPending">0%</span></div>
                        <div class="report-bar-row"><span>Rejected</span><div class="report-bar"><div class="report-bar-fill" id="barAppsRejected" style="width:0%; background:#DC2626;"></div></div><span id="pctAppsRejected">0%</span></div>
                    </div>
                </div>
            </div>

            <!-- ── Audit Log ── -->
            <div class="audit-section-header">
                <span class="audit-section-label"><i class="fa-solid fa-list-check"></i> Audit Log</span>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th>Timestamp</th><th>Action</th><th>Performed By</th><th>Details</th></tr>
                    </thead>
                    <tbody id="auditLogBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="components.js?v=9"></script>
    <script src="jobs-store.js?v=7"></script>
    <script src="admin-dashboard.js?v=12"></script>
</body>

</html>
