<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Joblynk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-page">

    <div class="auth-split-layout">
        <!-- Visual Sidebar -->
        <div class="auth-banner">
            <a href="index.html" class="auth-banner-logo">Joblynk.</a>
            
            <div class="auth-banner-content">
                <h1>Security matters.</h1>
                <p>We make sure your data is safe and easy to recover so you never miss out on an opportunity.</p>
            </div>
        </div>

        <!-- Form Sidebar -->
        <div class="auth-main">
            <a href="index.html" class="auth-mobile-logo">Joblynk.</a>

            <div class="auth-main-inner" style="justify-content: flex-start; padding-top: 5rem;">
                <div class="auth-header" style="margin-bottom: 2rem;">
                    <h2>Reset password</h2>
                    <p style="margin-top: 0.5rem; line-height: 1.6;">Enter the email address associated with your account and we'll send you a link to reset your password.</p>
                </div>

                <form id="forgotForm">
                    <div class="auth-form-group" style="margin-bottom: 2rem;">
                        <label for="reset-email">Email address</label>
                        <input type="email" id="reset-email" class="auth-input" placeholder="name@company.com" required autofocus>
                    </div>

                    <div id="formError" style="display: none; background: #FEF2F2; color: #DC2626; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem;"></div>
                    <div id="formSuccess" style="display: none; background: #F0FDF4; color: #16A34A; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem;"></div>

                    <button type="submit" class="auth-btn" id="btnSubmit" style="margin-bottom: 1.5rem;">
                        Send reset link
                    </button>
                    
                    <div style="text-align: center;">
                        <a href="sign-in.html" class="auth-link" style="display: inline-flex; align-items: center; gap: 0.5rem;">
                            <i class="fa-solid fa-arrow-left"></i> Back to Sign In
                        </a>
                    </div>
                </form>

                <script>
                    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const btn = document.getElementById('btnSubmit');
                        const errorEl = document.getElementById('formError');
                        const successEl = document.getElementById('formSuccess');
                        errorEl.style.display = 'none';
                        successEl.style.display = 'none';

                        const email = document.getElementById('reset-email').value.trim();

                        btn.disabled = true;
                        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

                        try {
                            const res = await fetch('api/auth/forgot-password.php', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email })
                            });
                            const data = await res.json();

                            if (data.success) {
                                successEl.textContent = data.message;
                                successEl.style.display = 'block';
                            } else {
                                errorEl.textContent = data.message;
                                errorEl.style.display = 'block';
                            }
                        } catch (err) {
                            errorEl.textContent = 'Something went wrong. Please try again.';
                            errorEl.style.display = 'block';
                        }

                        btn.disabled = false;
                        btn.textContent = 'Send reset link';
                    });
                </script>
            </div>
        </div>
    </div>

</body>

</html>
