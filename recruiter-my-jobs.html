<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobLynk – My Jobs</title>
    <meta name="description" content="Manage your job postings on JobLynk.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css?v=20260419">
    <link rel="stylesheet" href="recruiter-dashboard.css?v=20260419">
    <script src="auth-guard.js?v=20260419" data-role="recruiter"></script>
</head>

<body>
    <div id="app-sidebar" data-role="recruiter" data-active="my-jobs"></div>
    <div id="app-topbar" data-label="Recruiter"></div>

    <main class="main-content">
        <nav id="app-breadcrumb" data-crumbs='[{"label":"Recruiter","href":"recruiter-overview.html"},{"label":"My Jobs"}]'></nav>

        <section class="dash-section">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-briefcase section-icon" style="color:#3B4BA6"></i> Manage Postings</h2>
                <a href="recruiter-post-job.html" class="welcome-btn primary" style="padding: 8px 16px; font-size: 0.8rem;"><i class="fa-solid fa-plus"></i> Post Job</a>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table recruiter-table">
                    <thead>
                        <tr><th>Job Title</th><th>Status</th><th>Applicants</th><th>Posted Date</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="myJobsTableBody">
                        <tr><td colspan="5" style="padding: 2rem; text-align: center; color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Loading your jobs...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="components.js?v=20260419"></script>
    <script src="jobs-store.js?v=20260419"></script>
    <script src="recruiter-dashboard.js?v=20260419"></script>
</body>

</html>
