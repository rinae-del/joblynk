<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joblynk – Documents</title>
    <meta name="description" content="View all user documents on the Joblynk platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css?v=7">
    <link rel="stylesheet" href="admin-dashboard.css?v=7">
    <script src="auth-guard.js" data-role="admin"></script>
</head>

<body>
    <div id="app-sidebar" data-role="admin" data-active="documents"></div>
    <div id="app-topbar" data-label="Admin"></div>

    <main class="main-content">
        <nav id="app-breadcrumb" data-crumbs='[{"label":"Admin","href":"admin-overview.html"},{"label":"Documents"}]'></nav>

        <section class="dash-section">
            <div class="section-title-row">
                <h2><i class="fa-solid fa-folder-open section-icon" style="color:#D97706"></i> All Documents</h2>
            </div>

            <div class="section-title-row" style="margin-top:20px;">
                <h3 style="font-size:1.05rem;"><i class="fa-solid fa-file-lines" style="color:#3B82F6; margin-right:8px;"></i>CVs / Resumes</h3>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th>Document Name</th><th>Owner</th><th>Last Edited</th><th>Accent Color</th></tr>
                    </thead>
                    <tbody id="cvsTableBody"></tbody>
                </table>
            </div>

            <div class="section-title-row" style="margin-top:32px;">
                <h3 style="font-size:1.05rem;"><i class="fa-solid fa-envelope-open-text" style="color:#7E22CE; margin-right:8px;"></i>Cover Letters</h3>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th>Document Name</th><th>Owner</th><th>Last Edited</th><th>Accent Color</th></tr>
                    </thead>
                    <tbody id="clsTableBody"></tbody>
                </table>
            </div>
            <div class="table-footer">
                <span class="table-info" id="docsTableInfo">Showing 0 documents</span>
            </div>
        </section>
    </main>

    <script src="components.js?v=8"></script>
    <script src="jobs-store.js?v=7"></script>
    <script src="admin-dashboard.js?v=7"></script>
</body>

</html>
