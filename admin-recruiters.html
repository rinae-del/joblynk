<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joblynk â€“ Recruiter Management</title>
    <meta name="description" content="Manage recruiters on the Joblynk platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css?v=10">
    <link rel="stylesheet" href="admin-dashboard.css?v=12">
    <script src="auth-guard.js?v=8" data-role="admin"></script>
</head>

<body>
    <div id="app-sidebar" data-role="admin" data-active="recruiters"></div>
    <div id="app-topbar" data-label="Admin" data-role="admin"></div>

    <main class="main-content">
        <nav id="app-breadcrumb" data-crumbs='[{"label":"Admin","href":"admin-overview.html"},{"label":"Recruiters"}]'></nav>

        <!-- ── Recruiter Stats Banner ── -->
        <div class="user-stats-banner">
            <div class="user-stat-card">
                <div class="user-stat-icon" style="background:rgba(126,34,206,0.1); color:#7E22CE;"><i class="fa-solid fa-building"></i></div>
                <div class="user-stat-content">
                    <span class="user-stat-value" id="statTotalRecruiters">0</span>
                    <span class="user-stat-label">Total Recruiters</span>
                </div>
            </div>
            <div class="user-stat-card">
                <div class="user-stat-icon" style="background:rgba(16,185,129,0.1); color:#10B981;"><i class="fa-solid fa-circle-check"></i></div>
                <div class="user-stat-content">
                    <span class="user-stat-value" id="statVerifiedRecruiters">0</span>
                    <span class="user-stat-label">Verified</span>
                </div>
            </div>
            <div class="user-stat-card">
                <div class="user-stat-icon" style="background:rgba(245,158,11,0.1); color:#F59E0B;"><i class="fa-solid fa-clock"></i></div>
                <div class="user-stat-content">
                    <span class="user-stat-value" id="statPendingRecruiters">0</span>
                    <span class="user-stat-label">Pending</span>
                </div>
            </div>
            <div class="user-stat-card">
                <div class="user-stat-icon" style="background:rgba(59,130,246,0.1); color:#3B82F6;"><i class="fa-solid fa-briefcase"></i></div>
                <div class="user-stat-content">
                    <span class="user-stat-value" id="statRecruiterJobs">0</span>
                    <span class="user-stat-label">Active Jobs</span>
                </div>
            </div>
        </div>

        <!-- ── Filters + Controls ── -->
        <section class="dash-section">
            <div class="users-toolbar">
                <div class="search-box search-box-full">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="recruiterSearch" placeholder="Search by name, email or company..." oninput="advancedFilterRecruiters()">
                </div>
                <div class="filter-row">
                    <select class="filter-select" id="recruiterStatusFilter" onchange="advancedFilterRecruiters()">
                        <option value="">All Status</option>
                        <option value="verified">Verified</option>
                        <option value="unverified">Pending</option>
                    </select>
                    <span class="filter-result-count" id="recruiterCountBadge">0</span>
                </div>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr><th>Recruiter</th><th>Company</th><th>Active Jobs</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="recruitersTableBody"></tbody>
                </table>
            </div>
            <div class="table-footer">
                <span class="table-info" id="recruitersTableInfo">Loading recruiters...</span>
                <div class="table-pagination" id="recruitersPagination"></div>
            </div>
        </section>
    </main>

    <!-- ── Recruiter Detail Drawer ── -->
    <div class="drawer-overlay" id="recruiterDrawerOverlay"></div>
    <aside class="user-drawer" id="recruiterDrawer">
        <div class="drawer-header">
            <h3>Recruiter Details</h3>
            <button class="drawer-close" id="recruiterDrawerClose"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-body" id="recruiterDrawerBody"></div>
    </aside>

    <script src="components.js?v=9"></script>
    <script src="jobs-store.js?v=7"></script>
    <script src="admin-dashboard.js?v=12"></script>
</body>

</html>
